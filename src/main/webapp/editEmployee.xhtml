<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Edit Employee</title>
    <h:outputStylesheet library="css" name="style.css" />
</h:head>

<h:body>
    <div class="page">
        <div class="card">
            <h1 class="page-title">Edit Employee</h1>
            <p class="subtle">Update name, department, title and salary.</p>

            <h:messages styleClass="messages"
                        infoClass="msg-info" errorClass="msg-error" fatalClass="msg-error" warnClass="msg-error"
                        infoStyle="color:#0b6e4f;font-weight:700;background:#ecfdf3;border:1px solid #b7ebc6;padding:10px 12px;border-radius:10px;"
                        errorStyle="color:#b42318;font-weight:700;background:#fef3f2;border:1px solid #fecaca;padding:10px 12px;border-radius:10px;" />

            <h:form rendered="#{employeeEditBean.employeeFound}">
                <div class="form-grid">
                    <span class="field-label">Employee ID</span>
                    <h:outputText value="#{employeeEditBean.employee.empId}" />

                    <h:outputLabel styleClass="field-label" value="Name" />
                    <h:inputText value="#{employeeEditBean.employee.fullName}" required="true"
                                 requiredMessage="Name is required" />

                    <h:outputLabel styleClass="field-label" value="Department" />
                    <h:selectOneMenu value="#{employeeEditBean.selectedDeptId}" required="true"
                                     requiredMessage="Department is required">
                        <f:selectItem itemLabel="Select Department" itemValue="#{null}" noSelectionOption="true" />
                        <f:selectItems value="#{employeeEditBean.departments}" var="dept"
                                       itemLabel="#{dept.deptName}" itemValue="#{dept.deptId}" />
                    </h:selectOneMenu>

                    <h:outputLabel styleClass="field-label" value="Title" />
                    <h:inputText value="#{employeeEditBean.employee.title}" required="true"
                                 requiredMessage="Title is required" />

                    <h:outputLabel styleClass="field-label" value="Salary" />
                    <h:inputText value="#{employeeEditBean.employee.salary}" required="true"
                                 requiredMessage="Salary is required">
                        <f:validateDoubleRange minimum="0" />
                    </h:inputText>
                </div>

                <div class="actions-row">
                    <h:commandButton value="Save" action="#{employeeEditBean.save}" styleClass="btn" />
                    <h:link value="Back to Employees" outcome="employees" styleClass="btn-link btn-secondary" />
                </div>
            </h:form>

            <h:panelGroup rendered="#{not employeeEditBean.employeeFound}">
                <p>Employee not found.</p>
                <h:link value="Back to Employees" outcome="employees" styleClass="btn-link btn-secondary" />
            </h:panelGroup>
        </div>
    </div>

</h:body>
</html>
