<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Employees</title>
</h:head>

<h:body>
    <h1>Employee List</h1>

    <h:link value="Back to Departments" outcome="departments" />

    <br/><br/>

    <h:messages globalOnly="true" infoStyle="color:green;" errorStyle="color:red;" />

    <h:form>
        <h:outputLabel for="deptFilter" value="Filter by department: " />
        <h:selectOneMenu id="deptFilter" value="#{employeeBean.deptId}">
            <f:selectItem itemLabel="All Departments" itemValue="#{null}" noSelectionOption="true" />
            <f:selectItems value="#{employeeBean.departments}" var="dept"
                           itemLabel="#{dept.deptName}" itemValue="#{dept.deptId}" />
        </h:selectOneMenu>
        <h:commandButton value="Apply Filter" action="#{employeeBean.filterByDepartment}" />
    </h:form>

    <br/>

    <h:form>
        <h:outputLabel value="Search by name: " />
        <h:inputText value="#{employeeBean.keyword}" />
        <h:commandButton value="Search" action="#{employeeBean.search}" />
    </h:form>

    <br/>

    <h:dataTable value="#{employeeBean.employees}" var="emp" border="1">

        <h:column>
            <f:facet name="header">Employee ID</f:facet>
            #{emp.empId}
        </h:column>

        <h:column>
            <f:facet name="header">Full Name</f:facet>
            #{emp.fullName}
        </h:column>

        <h:column>
            <f:facet name="header">Title</f:facet>
            #{emp.title}
        </h:column>

        <h:column>
            <f:facet name="header">Department</f:facet>
            #{emp.department.deptName}
        </h:column>

        <h:column>
            <f:facet name="header">Salary</f:facet>
            #{emp.salary}
        </h:column>

        <h:column>
            <f:facet name="header">Hire Date</f:facet>
            #{emp.hireDate}
        </h:column>

        <h:column rendered="#{facesContext.externalContext.isUserInRole('ADMIN')}">
            <f:facet name="header">Edit</f:facet>
            <h:link value="Edit" outcome="editEmployee">
                <f:param name="id" value="#{emp.empId}" />
            </h:link>
        </h:column>

    </h:dataTable>
</h:body>
</html>
