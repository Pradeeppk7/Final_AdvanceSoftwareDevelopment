<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Employees</title>
    <h:outputStylesheet library="css" name="style.css" />
</h:head>

<h:body>
    <div class="page">
        <div class="card">
            <h1 class="page-title">Employee List</h1>

            <div class="actions">
                <h:link value="Back to Departments" outcome="departments" styleClass="btn-link btn-secondary" />
                <h:link value="Add Employee" outcome="addEmployee" styleClass="btn-link"
                        rendered="#{facesContext.externalContext.isUserInRole('ADMIN')}" />
            </div>

            <h:messages globalOnly="true" styleClass="messages"
                        infoClass="msg-info" errorClass="msg-error" fatalClass="msg-error" warnClass="msg-error"
                        infoStyle="color:#0b6e4f;font-weight:700;background:#ecfdf3;border:1px solid #b7ebc6;padding:10px 12px;border-radius:10px;"
                        errorStyle="color:#b42318;font-weight:700;background:#fef3f2;border:1px solid #fecaca;padding:10px 12px;border-radius:10px;" />

            <h:form styleClass="form-inline">
                <h:outputLabel for="deptFilter" value="Filter by department:" />
                <h:selectOneMenu id="deptFilter" value="#{employeeBean.deptId}">
                    <f:selectItem itemLabel="All Departments" itemValue="#{null}" noSelectionOption="true" />
                    <f:selectItems value="#{employeeBean.departments}" var="dept"
                                   itemLabel="#{dept.deptName}" itemValue="#{dept.deptId}" />
                </h:selectOneMenu>
                <h:commandButton value="Apply Filter" action="#{employeeBean.filterByDepartment}" styleClass="btn" />
            </h:form>

            <h:form styleClass="form-inline">
                <h:outputLabel for="keyword" value="Search by name:" />
                <h:inputText id="keyword" value="#{employeeBean.keyword}" />
                <h:commandButton value="Search" action="#{employeeBean.search}" styleClass="btn" />
            </h:form>

            <div class="table-wrap">
                <h:form>
                <h:dataTable value="#{employeeBean.employees}" var="emp" styleClass="data-table">

                    <h:column>
                        <f:facet name="header">Employee ID</f:facet>
                        #{emp.empId}
                    </h:column>

                    <h:column>
                        <f:facet name="header">Full Name</f:facet>
                        #{emp.fullName}
                    </h:column>

                    <h:column>
                        <f:facet name="header">Title</f:facet>
                        #{emp.title}
                    </h:column>

                    <h:column>
                        <f:facet name="header">Department</f:facet>
                        #{emp.department.deptName}
                    </h:column>

                    <h:column>
                        <f:facet name="header">Salary</f:facet>
                        #{emp.salary}
                    </h:column>

                    <h:column>
                        <f:facet name="header">Hire Date</f:facet>
                        #{emp.hireDate}
                    </h:column>

                    <h:column rendered="#{facesContext.externalContext.isUserInRole('ADMIN')}">
                        <f:facet name="header">Edit</f:facet>
                        <h:link value="Edit" outcome="editEmployee" styleClass="btn-link">
                            <f:param name="id" value="#{emp.empId}" />
                        </h:link>
                    </h:column>

                    <h:column rendered="#{facesContext.externalContext.isUserInRole('ADMIN')}">
                        <f:facet name="header">Delete</f:facet>
                        <h:commandButton value="Delete" action="#{employeeBean.delete(emp.empId)}"
                                         styleClass="btn btn-danger"
                                         onclick="return confirm('Delete employee #{emp.empId}?');" />
                    </h:column>

                </h:dataTable>
                </h:form>
            </div>
        </div>
    </div>
</h:body>
</html>
